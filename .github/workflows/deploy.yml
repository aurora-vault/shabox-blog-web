name: Deploy shabox-blog-ui

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: aurora
    if: github.actor == 'pxMan79'
    steps:
      - name: Sync code
        run: |
          set -e
          cd /opt/projects/shabox-blog-ui
          git fetch --all --prune
          git reset --hard origin/main
      - name: Build dist
        run: |
          cd /opt/projects/shabox-blog-ui
          npm ci
          npm run build
      - name: Deploy
        run: |
          cd /opt/projects/shabox-blog-ui
          docker compose up -d
          docker ps --filter name=shabox-blog-ui
