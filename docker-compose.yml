services:
  shabox-blog:
    image: nginx:alpine
    container_name: shabox-blog
    restart: unless-stopped
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx-conf/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - npm-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  npm-net:
    external: true
    name: nginx-proxy-manager_npm-net
